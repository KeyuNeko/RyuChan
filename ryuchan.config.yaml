# 站点基础配置：可在 /config 可视化页面填写，也可直接编辑本文件。
site:
  tab: 我的站点 # 填写浏览器标签文本
  title: 我的站点 # 填写导航栏站点名称
  title_type: text # text 为文字标题；image 为使用 user.title_image
  description: 请填写站点简介
  language: zh
  favicon: /favicon.ico # 替换为你的站点图标路径或 URL
  theme:
    light: garden
    dark: dracula
    code: snazzy-light
  date_format: ddd MMM DD YYYY
  blog:
    pageSize: 8
  banner:
    enableRandom: false # 如需随机横幅，设为 true 并填写 randomUrl
    randomUrl: ''
    randomCount: 5
    height: 70vh
    images: [] # 填写本地或远程横幅图片 URL
  # 备案信息：没有备案时保持为空；图标使用 Iconify 名称。
  icp: ''
  icp_link: https://beian.miit.gov.cn/
  icp_icon: ri:government-line
  police: ''
  police_link: https://beian.mps.gov.cn/
  police_icon: mdi:shield-account-outline
  pages:
    home:
      title: 欢迎来到我的站点
      subtitle: 请填写首页横幅副标题
      typewriterTexts: [] # 填写首页轮播文案
    friend:
      title: 友情链接
      subtitle: 请添加你的友链
    about:
      title: 关于我
      subtitle: 请填写个人介绍
    navigation:
      title: 网站导航
      subtitle: 请添加常用网站
    anime:
      title: 追番
      subtitle: 配置后展示追番列表
    project:
      title: 项目
      subtitle: 请添加你的项目
    album:
      title: 相册
      subtitle: 请上传你的照片
    music:
      title: 音乐
      subtitle: 请添加你的歌单
  meting:
    server: netease
    id: '' # 填写网易云歌单 ID
    br: '320'
    trans: true
  menu:
    - id: write
      text: 写作
      href: /write
      svg: material-symbols:edit-square-outline-rounded
      target: _self
    - id: navigation
      text: 导航
      href: /navigation
      svg: material-symbols:explore-outline
      target: _self
    - id: anime
      text: 追番
      href: /anime
      svg: material-symbols:movie-outline
      target: _self
    - id: album
      text: 相册
      href: /album
      svg: material-symbols:photo-library-outline-rounded
      target: _self
    - id: music
      text: 音乐
      href: /music
      svg: material-symbols:music-note-rounded
      target: _self
    - id: project
      text: 项目
      href: /project
      svg: material-symbols:code-blocks-outline
      target: _self
    - id: friend
      text: 友链
      href: /friend
      svg: material-symbols:supervisor-account-outline-rounded
      target: _self

# 追番：填写对应平台凭据后，页面才会拉取数据。
anime:
  bilibili:
    uid: '' # 填写你的 Bilibili UID
  tmdb:
    apiKey: '' # 填写 TMDB API Key
    listId: '' # 填写 TMDB 列表 ID

# 音乐：在 /config 中添加歌单；自定义歌曲数据存放于 src/data/music.json。
music:
  playlists: []

# 在线编辑需要 GitHub App。建议将敏感信息写入 .env，不要提交到仓库。
github:
  owner: '' # 填写 GitHub 用户名或组织名
  repo: '' # 填写博客所在仓库名
  branch: main # 填写目标分支
  appId: '' # 填写 GitHub App ID
  encryptKey: '' # 填写用于本地加密私钥的随机字符串

# 访问统计：启用后填写你的 Umami 服务地址、共享 ID 与网站 ID。
umami:
  enable: false
  baseUrl: ''
  shareId: ''
  websiteId: ''
  timezone: Asia/Shanghai

# 个人资料：替换占位图片和以下文字、站点地址与社交链接。
user:
  name: 请填写你的名字
  description: 请填写一句个人简介
  site: https://your-domain.example
  avatar: /avatar-placeholder.svg
  title_image: /site-logo-placeholder.svg
  qr_wechat: '' # 填写微信收款码图片路径或 URL
  qr_alipay: '' # 填写支付宝收款码图片路径或 URL
  sidebar:
    social: [] # 例如：href、title、ariaLabel、svg（Iconify 图标名）
  footer:
    social: []

# 评论：设为 true 后选择 giscus、waline 或 twikoo，并填写对应配置。
comments:
  enable: false
  type: none
  giscus:
    repo: ''
    repoId: ''
    category: General
    categoryId: ''
    mapping: pathname
    lang: zh-CN
  waline:
    serverURL: ''
    lang: zh
  twikoo:
    envId: ''
